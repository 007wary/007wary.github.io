<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Savr Expense Tracker</title>
  <meta name="description" content="Tips, updates and stories from the Savr team. Learn how to save money, track expenses and manage your budget better with practical India-focused finance advice.">
  <meta name="keywords" content="expense tracker blog, save money tips India, budget planning advice, personal finance India, Savr app updates, money saving tips, expense tracking guide">
  <meta name="author" content="Mwnswrang Wary">
  <meta name="robots" content="index, follow">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Blog — Savr Expense Tracker">
  <meta property="og:description" content="Tips, updates and stories from the Savr team.">
  <meta property="og:url" content="https://007wary.github.io/blog/">
  <link rel="canonical" href="https://007wary.github.io/blog/">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%236C63FF'/><rect x='22' y='35' width='56' height='38' rx='6' fill='white' opacity='0.95'/><rect x='22' y='42' width='56' height='8' fill='%236C63FF'/><rect x='58' y='48' width='14' height='14' rx='4' fill='white'/><circle cx='65' cy='55' r='3' fill='%236C63FF'/></svg>">
  <script type="module" src="https://cdnjs.cloudflare.com/ajax/libs/ionicons/7.1.0/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://cdnjs.cloudflare.com/ajax/libs/ionicons/7.1.0/ionicons/ionicons.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(circle at top, #1a152e 0%, #0F0F0F 60%);
      color: #FFFFFF;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 100px 20px 60px;
      overflow-x: hidden;
    }

    /* HEADER */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #1a1a1a;
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-brand { font-size: 22px; font-weight: 900; color: #6C63FF; text-decoration: none; letter-spacing: -1px; }
    .header-nav { display: flex; align-items: center; gap: 8px; }
    .header-nav a { color: #888; text-decoration: none; font-size: 14px; font-weight: 500; padding: 8px 14px; border-radius: 10px; transition: all 0.2s ease; }
    .header-nav a:hover, .header-nav a.active { color: #fff; background: rgba(255,255,255,0.06); }
    .hamburger { display: none; background: none; border: none; color: #888; cursor: pointer; padding: 8px; font-size: 22px; }
    .mobile-menu { display: none; position: fixed; top: 60px; left: 0; right: 0; background: rgba(10,10,10,0.98); border-bottom: 1px solid #1a1a1a; padding: 16px 24px; flex-direction: column; gap: 4px; z-index: 999; }
    .mobile-menu.open { display: flex; }
    .mobile-menu a { color: #888; text-decoration: none; font-size: 15px; font-weight: 500; padding: 12px 16px; border-radius: 10px; transition: all 0.2s ease; }
    .mobile-menu a:hover { color: #fff; background: rgba(255,255,255,0.06); }
    @media (max-width: 600px) {
      .header-nav { display: none; }
      .hamburger { display: block; }
      .header { padding: 0 20px; }
    }

    /* PAGE */
    .page { width: 100%; max-width: 720px; }

    .page-header { margin-bottom: 40px; }
    .page-header h1 { font-size: 42px; font-weight: 900; color: #fff; letter-spacing: -2px; margin-bottom: 8px; }
    .page-header h1 span { color: #6C63FF; }
    .page-header p { font-size: 15px; color: #666; }

    /* FILTER TABS */
    .filter-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .filter-tab {
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid #2A2A2A;
      background: none;
      color: #666;
      font-family: inherit;
      transition: all 0.2s ease;
    }
    .filter-tab:hover { color: #fff; border-color: #444; }
    .filter-tab.active { background: #6C63FF; color: #fff; border-color: #6C63FF; }

    /* POSTS */
    .posts-list { display: flex; flex-direction: column; gap: 16px; margin-bottom: 40px; }

    .post-card {
      background: rgba(26,26,26,0.6);
      border: 1px solid #2A2A2A;
      border-radius: 16px;
      padding: 24px;
      text-decoration: none;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .post-card:hover {
      border-color: rgba(108,99,255,0.4);
      transform: translateY(-3px);
      background: rgba(108,99,255,0.05);
    }
    .post-icon-box {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: rgba(108,99,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .post-icon-box ion-icon { font-size: 24px; color: #6C63FF; }
    .post-content { flex: 1; }
    .post-meta { font-size: 11px; color: #555; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
    .post-category { color: #6C63FF; }
    .post-title { font-size: 17px; font-weight: 700; color: #fff; margin-bottom: 6px; line-height: 1.4; }
    .post-excerpt { font-size: 13px; color: #666; line-height: 1.6; }
    .post-arrow { color: #555; flex-shrink: 0; }
    .post-arrow ion-icon { font-size: 20px; }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 60px 20px; color: #555; }
    .empty-state ion-icon { font-size: 48px; margin-bottom: 16px; display: block; }
    .empty-state p { font-size: 15px; }

    /* PAGINATION */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 24px;
      border-top: 1px solid #2A2A2A;
    }
    .page-info { font-size: 13px; color: #555; }
    .page-btns { display: flex; gap: 8px; align-items: center; }
    .page-btn {
      background: rgba(26,26,26,0.6);
      border: 1px solid #2A2A2A;
      border-radius: 10px;
      padding: 8px 16px;
      color: #666;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s ease;
    }
    .page-btn:hover:not(:disabled) { color: #fff; border-color: #444; }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .page-btn.active { background: #6C63FF; border-color: #6C63FF; color: #fff; }
    .page-nums { display: flex; gap: 4px; }

    /* FOOTER */
    .divider { width: 100%; max-width: 720px; height: 1px; background: #2A2A2A; margin: 60px 0 40px; }
    .footer { color: #555; font-size: 14px; text-align: center; line-height: 2.2; }
    .footer a { color: #6C63FF; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    .footer-links { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }

    @media (max-width: 600px) {
      body { padding-top: 80px; }
      .page-header h1 { font-size: 32px; }
      .post-card { flex-direction: column; gap: 12px; }
      .post-arrow { display: none; }
      .pagination { flex-direction: column; gap: 16px; text-align: center; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <a class="header-brand" href="/">Savr</a>
    <nav class="header-nav">
      <a href="/about.html">About</a>
      <a href="/blog/index.html" class="active">Blog</a>
      <a href="/delete-account.html">Delete Account</a>
    </nav>
    <button class="hamburger" onclick="toggleMenu()" id="hamburger-btn">☰</button>
  </header>

  <div class="mobile-menu" id="mobile-menu">
    <a href="/about.html" onclick="toggleMenu()">About</a>
    <a href="/blog/index.html" onclick="toggleMenu()">Blog</a>
    <a href="/delete-account.html" onclick="toggleMenu()">Delete Account</a>
  </div>

  <div class="page">
    <div class="page-header">
      <h1>Savr <span>Blog</span></h1>
      <p>Updates, tips and stories from the Savr team</p>
    </div>

    <div class="filter-tabs" id="filter-tabs">
      <button class="filter-tab active" onclick="filterPosts('all')">All</button>
      <button class="filter-tab" onclick="filterPosts('Story')">Story</button>
      <button class="filter-tab" onclick="filterPosts('Privacy')">Privacy</button>
      <button class="filter-tab" onclick="filterPosts('Tips')">Tips</button>
      <button class="filter-tab" onclick="filterPosts('Update')">Updates</button>
    </div>

    <div class="posts-list" id="posts-list"></div>
    <div class="pagination" id="pagination"></div>
  </div>

  <div class="divider"></div>
  <div class="footer">
    <div class="footer-links">
      <a href="/privacy-policy.html">Privacy Policy</a>
      <a href="/terms-of-service.html">Terms of Service</a>
    </div>
    <p>© <span id="year">2026</span> Savr · Developed by Wary Dev.</p>
    <p>Built with React Native & Expo</p>
    <p>Contact: <a href="mailto:007mwnswrangwary@gmail.com">007mwnswrangwary@gmail.com</a></p>
  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear()

    // ── ADD NEW POSTS HERE ──
    const posts = [
      {
        title: 'Why I Built Savr — A Developer\'s Story',
        date: 'Apr 18, 2026',
        category: 'Story',
        excerpt: 'How a simple frustration with existing expense trackers turned into a full Android app on the Play Store.',
        url: '/blog/posts/why-i-built-savr.html',
        icon: 'bulb-outline'
      },
      {
        title: 'How Savr Protects Your Financial Data',
        date: 'Apr 18, 2026',
        category: 'Privacy',
        excerpt: 'A deep dive into our privacy-first architecture — why your expenses never touch our servers.',
        url: '/blog/posts/how-savr-protects-your-data.html',
        icon: 'shield-checkmark-outline'
      },
      {
        title: '5 Simple Tips to Save More Money Every Month',
        date: 'Apr 18, 2026',
        category: 'Tips',
        excerpt: 'Practical, India-specific money saving tips that actually work — no complicated finance jargon.',
        url: '/blog/posts/5-tips-to-save-more.html',
        icon: 'cash-outline'
      },
    ]

    const PAGE_SIZE = 10
    let currentPage = 1
    let activeFilter = 'all'
    let filtered = [...posts]

    function filterPosts(category) {
      activeFilter = category
      currentPage = 1
      filtered = category === 'all' ? [...posts] : posts.filter(p => p.category === category)
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'))
      event.target.classList.add('active')
      render()
    }

    function render() {
      const list = document.getElementById('posts-list')
      const total = filtered.length
      const totalPages = Math.max(Math.ceil(total / PAGE_SIZE), 1)
      currentPage = Math.min(Math.max(currentPage, 1), totalPages)
      const start = (currentPage - 1) * PAGE_SIZE
      const pagePosts = filtered.slice(start, start + PAGE_SIZE)

      if (!pagePosts.length) {
        list.innerHTML = `<div class="empty-state"><ion-icon name="document-outline"></ion-icon><p>No posts in this category yet</p></div>`
      } else {
        list.innerHTML = pagePosts.map(p => `
          <a class="post-card" href="${p.url}">
            <div class="post-icon-box"><ion-icon name="${p.icon}"></ion-icon></div>
            <div class="post-content">
              <div class="post-meta">${p.date} · <span class="post-category">${p.category}</span></div>
              <div class="post-title">${p.title}</div>
              <div class="post-excerpt">${p.excerpt}</div>
            </div>
            <div class="post-arrow"><ion-icon name="chevron-forward-outline"></ion-icon></div>
          </a>
        `).join('')
      }

      const pag = document.getElementById('pagination')
      if (total <= PAGE_SIZE) { pag.innerHTML = ''; return }

      const pageNums = Array.from({ length: Math.min(totalPages, 5) }, (_, i) => {
        let page = i + 1
        if (totalPages > 5) {
          if (currentPage <= 3) page = i + 1
          else if (currentPage >= totalPages - 2) page = totalPages - 4 + i
          else page = currentPage - 2 + i
        }
        return `<button class="page-btn ${page === currentPage ? 'active' : ''}" onclick="goToPage(${page})">${page}</button>`
      }).join('')

      pag.innerHTML = `
        <div class="page-info">Showing ${start + 1}–${Math.min(start + PAGE_SIZE, total)} of ${total} posts</div>
        <div class="page-btns">
          <button class="page-btn" onclick="changePage(-1)" ${currentPage === 1 ? 'disabled' : ''}>← Prev</button>
          <div class="page-nums">${pageNums}</div>
          <button class="page-btn" onclick="changePage(1)" ${currentPage === totalPages ? 'disabled' : ''}>Next →</button>
        </div>
      `
    }

    function changePage(dir) {
      const totalPages = Math.ceil(filtered.length / PAGE_SIZE)
      currentPage = Math.min(Math.max(currentPage + dir, 1), totalPages)
      render()
      window.scrollTo({ top: 0, behavior: 'smooth' })
    }

    function goToPage(page) {
      currentPage = page
      render()
      window.scrollTo({ top: 0, behavior: 'smooth' })
    }

    function toggleMenu() {
      const menu = document.getElementById('mobile-menu')
      const btn = document.getElementById('hamburger-btn')
      const isOpen = menu.classList.contains('open')
      menu.classList.toggle('open')
      btn.textContent = isOpen ? '☰' : '✕'
    }

    document.addEventListener('click', function(e) {
      const menu = document.getElementById('mobile-menu')
      const btn = document.getElementById('hamburger-btn')
      if (!menu.contains(e.target) && !btn.contains(e.target)) {
        menu.classList.remove('open')
        btn.textContent = '☰'
      }
    })

    render()
  </script>

</body>
</html>
